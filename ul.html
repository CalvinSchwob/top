<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unordered List (UL)</title>
</head>
<body>
    <h1>Unordered List</h1>

    <h2>Beispiel:</h2>

    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li>usw.....</li>
    </ul>

    <p>Die Pramisse von unrodered Lists ist einfach, dass man Listenelemente mit Bulletpoints anstatt Nummern (deshalb unordered) darstellen kann.</p>
</body>
</html>
